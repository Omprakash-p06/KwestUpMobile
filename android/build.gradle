// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            try {
                def cmake = project.android.defaultConfig.externalNativeBuild?.cmake
                if (cmake != null) {
                    // Inject 16 KB page-size alignment flags for all C/C++ native modules.
                    // Required for Android 16 (API 36) which enforces 16 KB ELF alignment.
                    if (!cmake.arguments.contains("-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON")) {
                        cmake.arguments.add("-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON")
                    }
                    if (!cmake.arguments.any { it.startsWith("-DCMAKE_SHARED_LINKER_FLAGS=") }) {
                        cmake.arguments.add("-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384")
                    }
                }
            } catch (Exception e) {
                // Module has android {} but no externalNativeBuild.cmake — skip silently.
            }
        }
    }
}
